<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
</style>
<script src="https://code.jquery.com/jquery.min.js"></script>
<script>
	/* 
		$.ajax()
		$.get()
		$.post()
		$.getJSON()
		$.load()
		
	*/
	$( function() {
		let url = 'https://jsonplaceholder.typicode.com/posts';
		// Get DataList
		$('button').eq(0).on('click', function() {
			$.ajax({
				url : url
			})
			.done(function(posts) {
				//console.log(posts)
				let html = ''
				$.each(posts, function(index, post) {
					console.log(post)
					html += `<ul>
					<li>Uid=${post.userId}</li>
					<li>id=${post.id}</li>
					<li>${post.title}</li>
					<li>${post.body}</li>
					</ul>` 
				})
				$('#output').html(html)
			})
			.fail(function(error) {
				alert(error)
			})
		}) // Get Data List
		$('button').eq(1).on('click', function() {
		//Get Data(Get) 
		///posts/2 -> path variable 경로에 데이터를 넣는 방식 -> Get 방식만 가능
		let url2 = 'https://jsonplaceholder.typicode.com/posts/2'
		$.get(url2, function(result) {
				console.log(result)
				alert(result.id + result.title)
			})			
		})
	})
</script>
</head>
<body>
	<h2>JQuery Ajax 01</h2>
	<button>Get DataList</button>
	<button>Get Data(GET)</button>
	<div id="output"></div>
</body>
</html>
