<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BusanFestival-Fetch</title>
</head>
<style>
	ul {
		border: 1px solid black;
		border-radius: 10px;
		margin: 10px;
	}
</style>
<body>
	<h2>부산 축제 서비스</h2>
	보고싶은 페이지<input type="number" id="page" value="1" min="1" max="4">
	<button id="btn">축제 조회</button>
	<div id="opt"></div>
	
	<script>
		const numEl = document.querySelector('#page')
		const btnEl = document.querySelector('#btn')
		const optEl = document.querySelector('#opt')
		
		btnEl.addEventListener('click', function() {
			let url = 'http://apis.data.go.kr/6260000/FestivalService/getFestivalKr'
			url += '?ServiceKey=f3e9da7e69abfa8277c29e5619125b426c15776092c665144d48b16ef4aa67fd'
			url += '&numOfRows=10'
			url += '&pageNo=' + numEl.value
			url += '&resultType=json'
			url += '&uc_seq=11'
			
			fetch(url)
			  .then(response => response.json() )
			  .then(json => {
				  console.log(json)
				  let data = json.getFestivalKr
				  let itemList = data.item
				  let totalCount = parseInt(data.totalCount)
				  let numOfRows = parseInt(data.numOfRows)
				  let maxPage = Math.ceil(totalCount / numOfRows)
				  numEl.max = maxPage
				  console.log(itemList)
				  
				  dataDisplay(itemList)
			  })
			  .catch( error => console.log(error))			  
		})
		function dataDisplay(itemList) {
			let html = ''
			itemList.forEach(function(item) {
				html += `
					<ul>
					  <li>콘텐츠ID: ${item.UC_SEQ}</li>
					  <li>콘텐츠명: ${item.TITLE}</li>
					  <li>구군: ${item.GUGUN_NM}</li>
					  <li>위도: ${item.LAT}</li>
					  <li>경도: ${item.LNG}</li>
					  <li>장소: ${item.PLACE}</li>
					  <li>제목: ${item.TITLE}</li>
					  <li>주소: ${item.ADDR1}</li>
					  <li>연락처: ${item.CNTCT_TEL}</li>
					  <li>썸네일: ${item.MAIN_IMG_THUMB}</li>
					  <li><img src="${item.MAIN_IMG_THUMB}"/></li>
					</ul>
				`
			})
			optEl.innerHTML = html
		} 
	</script>
</body>
</html>
